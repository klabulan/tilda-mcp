startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - TILDA_PUBLIC_KEY
      - TILDA_SECRET_KEY
    properties:
      TILDA_PUBLIC_KEY:
        type: string
        title: Tilda Public Key
        description: Public API key from https://tilda.cc/identity/apikeys/
      TILDA_SECRET_KEY:
        type: string
        title: Tilda Secret Key
        description: Secret API key from https://tilda.cc/identity/apikeys/
  commandFunction: |
    (config) => ({
      command: "npx",
      args: ["-y", "@theyahia/tilda-mcp"],
      env: {
        TILDA_PUBLIC_KEY: config.TILDA_PUBLIC_KEY,
        TILDA_SECRET_KEY: config.TILDA_SECRET_KEY,
      },
    })
